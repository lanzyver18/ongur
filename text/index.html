<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ongur - Text Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chatMessages p { margin-bottom: 12px; line-height: 1.5; font-size: 1.1rem; }
        .you-msg { color: #ff0000; font-weight: bold; }
        .stranger-msg { color: #0000ff; font-weight: bold; }
        .status-msg { color: #777; font-style: italic; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body class="bg-white text-black h-screen flex flex-col font-sans overflow-hidden">
    <header class="p-4 border-b border-gray-300 flex justify-between items-center bg-white shadow-sm">
        <h1 class="text-2xl font-extrabold text-blue-700 tracking-tighter uppercase">Ongur Text</h1>
        <a href="/" class="text-xs font-bold text-gray-400 hover:underline">Exit</a>
    </header>

    <main class="flex-grow flex flex-col max-w-4xl mx-auto w-full overflow-hidden bg-gray-50 border-x border-gray-200">
        <div id="chatMessages" class="flex-grow p-6 overflow-y-auto bg-white">
            <p class="status-msg">Click Start to find a text-only stranger.</p>
        </div>
        <div class="p-4 bg-gray-100 border-t border-gray-300">
            <div class="flex gap-2">
                <textarea id="chatInput" placeholder="Type message..." class="flex-grow border border-gray-300 rounded-lg p-3 text-lg focus:outline-none focus:border-blue-500 h-20 resize-none shadow-inner" disabled></textarea>
                <button id="sendBtn" class="bg-blue-600 text-white px-8 rounded-lg font-bold disabled:opacity-50" disabled>Send</button>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-300 flex justify-center gap-4">
        <button id="startBtn" class="bg-blue-700 text-white px-16 py-4 rounded-full font-bold text-xl shadow-lg active:scale-95 transition-all">Start Chatting</button>
        <button id="nextBtn" class="hidden bg-gray-200 text-black px-16 py-4 rounded-full font-bold text-xl shadow-sm border border-gray-300 active:scale-95">Stop</button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, getDocs, query, limit, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6VxPhC3Y214VvPJTS4XQebN5k4KTBBps",
            authDomain: "ongur-26b0d.firebaseapp.com",
            projectId: "ongur-26b0d",
            storageBucket: "ongur-26b0d.firebasestorage.app",
            messagingSenderId: "1096173981635",
            appId: "1:1096173981635:web:4722a323d2fd111123b776",
            measurementId: "G-KK16MH00SV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        let pc, dataChannel, currentRoomId, isStopped = true;

        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const chatBox = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        startBtn.onclick = async () => {
            isStopped = false; startBtn.classList.add('hidden'); nextBtn.classList.remove('hidden');
            await startSession();
        };

        nextBtn.onclick = async () => {
            if (nextBtn.innerText === "Stop") { nextBtn.innerText = "Next"; nextBtn.className = "bg-orange-500 text-white px-16 py-4 rounded-full font-bold"; await stopEverything(); }
            else { isStopped = false; nextBtn.innerText = "Stop"; nextBtn.className = "bg-gray-200 text-black px-16 py-4 rounded-full font-bold"; await startSession(); }
        };

        async function stopEverything() {
            isStopped = true; if (pc) pc.close(); if (currentRoomId) await deleteDoc(doc(db, "text_rooms", currentRoomId));
            chatBox.innerHTML = '<p class="status-msg">Stranger disconnected.</p>'; chatInput.disabled = true;
        }

        async function startSession() {
            if (isStopped) return;
            chatBox.innerHTML = '<p class="status-msg">Searching for a partner...</p>';
            await signInAnonymously(auth);
            const q = query(collection(db, "text_rooms"), limit(1));
            const snapshot = await getDocs(q);
            if (snapshot.empty) createRoom(); else joinRoom(snapshot.docs[0].id);
        }

        async function createRoom() {
            pc = new RTCPeerConnection(servers);
            dataChannel = pc.createDataChannel("chat"); setupDataChannel();
            const roomRef = doc(collection(db, "text_rooms")); currentRoomId = roomRef.id;
            pc.onicecandidate = (e) => e.candidate && addDoc(collection(roomRef, "hostCandidates"), e.candidate.toJSON());
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            await setDoc(roomRef, { offer: { sdp: offer.sdp, type: offer.type } });
            onSnapshot(roomRef, (snap) => {
                const data = snap.data();
                if (pc && !pc.currentRemoteDescription && data?.answer) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    chatBox.innerHTML = '<p class="status-msg text-blue-600 font-bold underline">Talking to a random stranger!</p>';
                }
            });
            onSnapshot(collection(roomRef, "joinCandidates"), (s) => s.docChanges().forEach(c => c.type === "added" && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        async function joinRoom(roomId) {
            pc = new RTCPeerConnection(servers);
            pc.ondatachannel = (e) => { dataChannel = e.channel; setupDataChannel(); };
            const roomRef = doc(db, "text_rooms", roomId);
            const roomData = (await getDoc(roomRef)).data();
            await deleteDoc(roomRef); currentRoomId = roomId;
            pc.onicecandidate = (e) => e.candidate && addDoc(collection(roomRef, "joinCandidates"), e.candidate.toJSON());
            await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            await setDoc(roomRef, { answer: { sdp: answer.sdp, type: answer.type } }, { merge: true });
            onSnapshot(collection(roomRef, "hostCandidates"), (s) => s.docChanges().forEach(c => c.type === "added" && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
            chatBox.innerHTML = '<p class="status-msg text-blue-600 font-bold underline">Talking to a random stranger!</p>';
        }

        function setupDataChannel() {
            dataChannel.onopen = () => { chatInput.disabled = false; document.getElementById('sendBtn').disabled = false; };
            dataChannel.onmessage = (e) => addMsg("Stranger", e.data, "stranger-msg");
        }

        function addMsg(s, t, c) {
            const p = document.createElement('p'); p.innerHTML = `<span class="${c}">${s}:</span> ${t}`;
            chatBox.appendChild(p); chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = () => {
            const val = chatInput.value;
            if (val && dataChannel?.readyState === "open") {
                dataChannel.send(val); addMsg("You", val, "you-msg"); chatInput.value = "";
            }
        };
    </script>
</body>
</html>
