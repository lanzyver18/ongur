<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ongur - Talk to Strangers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col justify-center items-center p-6 text-center">
    
    <div class="max-w-xl">
        <h1 class="text-6xl font-extrabold text-blue-700 tracking-tighter uppercase mb-2">Ongur</h1>
        <p class="text-gray-500 font-bold text-lg mb-8 italic italic">Talk to strangers, completely anonymous.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="/video" class="bg-blue-700 text-white p-8 rounded-2xl shadow-xl hover:bg-blue-800 transition-all hover:scale-105">
                <h2 class="text-2xl font-bold mb-1">Video Chat</h2>
                <p class="text-blue-200 text-sm">Webcam required. 1080p HD.</p>
            </a>
            <a href="/text" class="bg-white border-2 border-blue-700 text-blue-700 p-8 rounded-2xl shadow-xl hover:bg-gray-50 transition-all hover:scale-105">
                <h2 class="text-2xl font-bold mb-1">Text Chat</h2>
                <p class="text-gray-400 text-sm">Anonymous typing. No camera.</p>
            </a>
        </div>
    </div>

    <footer class="mt-12 text-gray-400 text-xs font-bold uppercase tracking-widest">
        You must be 18+ to use Ongur.
    </footer>

</body>
</html>
