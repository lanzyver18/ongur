<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omegle Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chatMessages p { margin-bottom: 8px; line-height: 1.4; }
        .you-msg { color: #ff0000; font-weight: bold; }
        .stranger-msg { color: #0000ff; font-weight: bold; }
        .status-msg { color: #555; font-style: italic; font-size: 0.85rem; }
        
        /* FITS VIDEO TO CONTAINER REGARDLESS OF SCREEN SIZE */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes it "fill" the box like Zoom/Instagram */
            background-color: #000;
        }
    </style>
</head>
<body class="bg-white text-black h-screen flex flex-col font-sans overflow-hidden">

    <header class="p-3 border-b border-gray-300 flex justify-between items-center bg-white">
        <div class="flex items-baseline gap-2">
            <h1 class="text-3xl font-extrabold text-blue-700 tracking-tighter">Omegle</h1>
            <span class="text-xs font-bold text-gray-500 uppercase italic">Talk to strangers!</span>
        </div>
        <div id="status" class="text-xs font-semibold text-gray-400 uppercase tracking-tighter">Status: Offline</div>
    </header>

    <main class="flex-grow flex flex-col md:flex-row overflow-hidden border-b border-gray-300">
        
        <div class="flex-grow md:w-2/3 flex flex-col p-2 gap-2 bg-gray-100">
            <div class="flex-grow grid grid-rows-2 gap-2 h-full">
                <div class="relative bg-black rounded shadow-inner overflow-hidden">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="absolute top-2 left-2 bg-white/80 px-2 py-0.5 text-[10px] font-bold rounded border border-gray-300">YOU</div>
                </div>
                <div class="relative bg-black rounded shadow-inner overflow-hidden">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="absolute top-2 left-2 bg-white/80 px-2 py-0.5 text-[10px] font-bold rounded border border-gray-300">STRANGER</div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/3 flex flex-col bg-white border-l border-gray-300">
            <div id="chatMessages" class="flex-grow p-4 overflow-y-auto text-sm border-b border-gray-200 bg-white">
                <p class="status-msg">Omegle is a great way to meet new friends.</p>
            </div>
            <div class="p-3 bg-gray-50 flex flex-col gap-2">
                <div class="flex gap-2">
                    <textarea id="chatInput" placeholder="Type message..." class="flex-grow border border-gray-300 rounded p-2 text-sm focus:outline-none focus:border-blue-500 resize-none h-16" disabled></textarea>
                    <button id="sendBtn" class="bg-blue-600 text-white px-4 rounded font-bold text-sm disabled:opacity-50" disabled>Send</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-gray-100 flex justify-center items-center gap-4">
        <button id="startBtn" class="bg-blue-700 hover:bg-blue-800 text-white px-12 py-3 rounded-md font-bold text-lg shadow-md active:scale-95">Start Chat</button>
        <button id="nextBtn" class="hidden bg-gradient-to-b from-orange-400 to-orange-600 hover:from-orange-500 hover:to-orange-700 text-white px-12 py-3 rounded-md font-bold text-lg shadow-md active:scale-95">Next</button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, getDocs, query, limit, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIG (Replace with your actual keys if Vercel Build Step is failing)
        const firebaseConfig = {
            apiKey: "APP_FIREBASE_API_KEY",
            authDomain: "APP_FIREBASE_AUTH_DOMAIN",
            projectId: "APP_FIREBASE_PROJECT_ID",
            storageBucket: "APP_FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "APP_FIREBASE_MESSAGING_SENDER_ID",
            appId: "APP_FIREBASE_APP_ID",
            measurementId: "APP_FIREBASE_MEASUREMENT_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        let pc = null;
        let localStream = null;
        let dataChannel = null;
        let currentRoomId = null;

        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        startBtn.onclick = async () => {
            startBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            await startSession();
        };

        // NEXT BUTTON: DISCONNECTS AND RE-MATCHES WITHOUT REFRESHING
        nextBtn.onclick = async () => {
            await cleanup();
            await startSession();
        };

        async function cleanup() {
            if (pc) { pc.close(); pc = null; }
            if (currentRoomId) { 
                // Attempt to delete the room document to keep DB clean
                try { await deleteDoc(doc(db, "rooms", currentRoomId)); } catch(e) {}
                currentRoomId = null;
            }
            document.getElementById('remoteVideo').srcObject = null;
            chatBox.innerHTML = '<p class="status-msg">Searching for a stranger...</p>';
            chatInput.disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        async function startSession() {
            statusText.innerText = "STATUS: AUTHORIZING...";
            await signInAnonymously(auth);
            
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('localVideo').srcObject = localStream;
                } catch (e) {
                    addMsg("System", "Camera access denied.", "status-msg");
                    return;
                }
            }

            statusText.innerText = "STATUS: SEARCHING...";
            const q = query(collection(db, "rooms"), limit(1));
            const snapshot = await getDocs(q);

            if (snapshot.empty) { createRoom(); } else { joinRoom(snapshot.docs[0].id); }
        }

        async function createRoom() {
            const pc_new = new RTCPeerConnection(servers);
            pc = pc_new;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            dataChannel = pc.createDataChannel("chat");
            setupDataChannel();

            const roomRef = doc(collection(db, "rooms"));
            currentRoomId = roomRef.id;

            pc.onicecandidate = (e) => e.candidate && addDoc(collection(roomRef, "hostCandidates"), e.candidate.toJSON());
            pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(roomRef, { offer: { sdp: offer.sdp, type: offer.type } });

            onSnapshot(roomRef, (snap) => {
                const data = snap.data();
                if (pc === pc_new && !pc.currentRemoteDescription && data?.answer) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    statusText.innerText = "STATUS: CONNECTED";
                }
            });

            onSnapshot(collection(roomRef, "joinCandidates"), (s) => {
                s.docChanges().forEach(c => c.type === "added" && pc && pc.addIceCandidate(new RTCIceCandidate(c.doc.data())));
            });
        }

        async function joinRoom(roomId) {
            currentRoomId = roomId;
            const pc_new = new RTCPeerConnection(servers);
            pc = pc_new;
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            pc.ondatachannel = (e) => { dataChannel = e.channel; setupDataChannel(); };
            pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const roomRef = doc(db, "rooms", roomId);
            const roomData = (await getDoc(roomRef)).data();
            await deleteDoc(roomRef);

            pc.onicecandidate = (e) => e.candidate && addDoc(collection(roomRef, "joinCandidates"), e.candidate.toJSON());
            await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await setDoc(roomRef, { answer: { sdp: answer.sdp, type: answer.type } }, { merge: true });

            onSnapshot(collection(roomRef, "hostCandidates"), (s) => {
                s.docChanges().forEach(c => c.type === "added" && pc && pc.addIceCandidate(new RTCIceCandidate(c.doc.data())));
            });
            statusText.innerText = "STATUS: CONNECTED";
        }

        function setupDataChannel() {
            dataChannel.onopen = () => { chatInput.disabled = false; document.getElementById('sendBtn').disabled = false; };
            dataChannel.onmessage = (e) => addMsg("Stranger", e.data, "stranger-msg");
        }

        function addMsg(s, t, c) {
            const p = document.createElement('p');
            p.innerHTML = `<span class="${c}">${s}:</span> ${t}`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = () => {
            const val = chatInput.value;
            if (val && dataChannel?.readyState === "open") {
                dataChannel.send(val);
                addMsg("You", val, "you-msg");
                chatInput.value = "";
            }
        };
    </script>
</body>
</html>
